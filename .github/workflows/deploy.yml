name: Deploy to makepost.pro

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger deploy webhook
        run: |
          PAYLOAD='{"ref":"refs/heads/main"}'
          SIG=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "makepost_deploy_2026" | awk '{print "sha256="$2}')
          curl -s -X POST https://makepost.pro/deploy-hook \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIG" \
            -d "$PAYLOAD" \
            --max-time 30
          echo "Deploy triggered!"
