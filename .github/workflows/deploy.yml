name: Deploy to makepost.pro

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd frontend
          npm install --silent
          npm run build

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 191.101.2.4 >> ~/.ssh/known_hosts 2>/dev/null
          echo "SSH key ready"

      - name: Deploy backend files
        run: |
          rsync -az \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            --delete \
            --exclude='venv/' \
            --exclude='.venv/' \
            --exclude='__pycache__/' \
            --exclude='*.pyc' \
            --exclude='static/images/' \
            --exclude='local_data.db' \
            --exclude='.env' \
            backend/ root@191.101.2.4:/var/www/linkedin-generator/backend/

      - name: Deploy frontend build
        run: |
          rsync -az \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            --delete \
            frontend/dist/ root@191.101.2.4:/var/www/linkedin-generator/frontend/dist/

      - name: Restart backend & reload nginx
        run: |
          ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            root@191.101.2.4 << 'ENDSSH'
          /var/www/linkedin-generator/backend/venv/bin/pip install \
            -r /var/www/linkedin-generator/backend/requirements.txt --quiet
          systemctl restart makepost
          nginx -t && systemctl reload nginx
          echo "Deploy complete!"
          ENDSSH
