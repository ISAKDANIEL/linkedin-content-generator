name: Deploy to makepost.pro

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd frontend
          npm install --silent
          npm run build

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 191.101.2.4 >> ~/.ssh/known_hosts
          ssh-keyscan -H makepost.pro >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy backend files
        run: |
          rsync -az -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" --delete \
            --exclude='venv' \
            --exclude='.venv' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='static/images' \
            --exclude='local_data.db' \
            --exclude='.env' \
            backend/ root@191.101.2.4:/var/www/linkedin-generator/backend/

      - name: Deploy frontend build
        run: |
          rsync -az -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" --delete \
            frontend/dist/ root@191.101.2.4:/var/www/linkedin-generator/frontend/dist/

      - name: Restart services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 191.101.2.4
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            /var/www/linkedin-generator/backend/venv/bin/pip install -r /var/www/linkedin-generator/backend/requirements.txt --quiet
            systemctl restart makepost
            nginx -t && systemctl reload nginx
            echo "Deploy done!"
