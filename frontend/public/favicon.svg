<svg xmlns="http://www.w3.org/2000/svg" viewBox="70 50 370 380" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="15" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <!-- Background with frame -->
    <rect x="148" y="80" width="262" height="320" fill="#F8F8F8" />
    
    <!-- Document Outline -->
    <path d="M160 80 H336 L410 160 V400 H160 Z" fill="#F8F8F8" stroke="#000000" stroke-width="24" stroke-linejoin="round" />
    <!-- Folded corner -->
    <path d="M336 80 V160 H410" fill="#000000" />
    
    <!-- Picture Box -->
    <rect x="188" y="110" width="130" height="90" fill="#000000" rx="4" />
    <!-- Mountains inside picture box -->
    <path d="M188 180 L230 135 L275 190 H188 Z" fill="#F8F8F8" />
    <path d="M255 180 L280 150 L310 190 H255 Z" fill="#F8F8F8" />
    
    <!-- Text Lines -->
    <rect x="188" y="215" width="180" height="12" fill="#000000" rx="6" />
    <rect x="188" y="238" width="180" height="12" fill="#000000" rx="6" />
    <rect x="188" y="261" width="180" height="12" fill="#000000" rx="6" />
    
    <!-- Short Text Lines (Left of Video Box) -->
    <rect x="188" y="284" width="75" height="12" fill="#000000" rx="6" />
    <rect x="188" y="307" width="75" height="12" fill="#000000" rx="6" />
    <rect x="188" y="330" width="75" height="12" fill="#000000" rx="6" />
    <rect x="188" y="353" width="75" height="12" fill="#000000" rx="6" />

    <!-- Video Box -->
    <rect x="277" y="284" width="91" height="81" fill="#000000" rx="4" />
    <!-- Play Button -->
    <path d="M309 308 L343 324 L309 342 Z" fill="#F8F8F8" />

    <!-- Pencil -->
    <g transform="translate(10, 0)">
      <!-- Main Body -->
      <path d="M140 210 L230 350 L200 365 L110 225 Z" fill="#000000" />
      <!-- Eraser Tip -->
      <path d="M140 210 L110 225 L92 195 A 15 15 0 0 1 122 180 Z" fill="#000000" />
      <!-- Eraser Metal Band (White stripe) -->
      <path d="M145 218 L115 233 L105 218 L135 203 Z" fill="#F8F8F8" />
      <!-- Pencil Tip -->
      <path d="M230 350 L242 375 L200 365 Z" fill="#000000" />
      <!-- Lead (White gap) -->
      <path d="M235 362 L242 375 L218 369 Z" fill="#F8F8F8" />
      <path d="M239 371 L242 375 L231 372 Z" fill="#000000" />
    </g>
  </g>
</svg>
